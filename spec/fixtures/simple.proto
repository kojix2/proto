syntax = "proto3";

package simple;

enum Status {
  STATUS_UNKNOWN = 0;
  STATUS_OK = 1;
  STATUS_ERROR = 2;
}

message Person {
  string name = 1;
  int32 age = 2;
  bool active = 3;
  Status status = 4;
  repeated string tags = 5;
  Address address = 6;
}

message Address {
  string street = 1;
  string city = 2;
}
